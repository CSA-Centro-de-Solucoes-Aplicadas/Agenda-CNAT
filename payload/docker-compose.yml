services:
  payload:
    build: .
    ports:
      - '3000:3000'
    volumes:
      - .:/home/node/app
      - node_modules:/home/node/app/node_modules
    working_dir: /home/node/app/
    command: sh -c "npm install && npm run dev"
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=postgres://agenda_user:k9Xm2PqL5vJw8Zn4R7bT3yH6cF1gS0dM@postgres:5432/agenda_db
      - PAYLOAD_SECRET=agenda-cnat-local-dev-secret

  postgres:
    image: postgres:16
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: agenda_db
      POSTGRES_USER: agenda_user
      POSTGRES_PASSWORD: k9Xm2PqL5vJw8Zn4R7bT3yH6cF1gS0dM
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
  node_modules:
